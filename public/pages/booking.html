<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking - Bus Reservation System</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">🚌 BusReserve</div>
      <ul class="nav-menu">
        <li><a href="../index.html">Home</a></li>
        <li><a href="search.html">Search</a></li>
        <li><a href="#" id="navLogoutLink" onclick="logout()">Logout</a></li>
      </ul>
    </div>
  </nav>

  <div class="page-container">
    <div class="booking-page">
      <div class="booking-container">
        <div class="bus-info">
          <h2>Bus Details</h2>
          <div id="busDetails" class="bus-details-box"></div>
        </div>

        <div class="seat-selection">
          <h3>Select Your Seat</h3>
          <div id="seatMap" class="seat-map"></div>
        </div>

        <div class="passenger-info">
          <h3>Passenger Information</h3>
          <form id="passengerForm" onsubmit="completeBooking(event)">
            <input type="text" id="passengerName" placeholder="Name" required>
            <input type="email" id="passengerEmail" placeholder="Email" required>
            <input type="tel" id="passengerPhone" placeholder="Phone" required>
            <button type="submit" class="btn-primary">Confirm Booking</button>
          </form>
        </div>

        <div class="booking-summary">
          <h3>Booking Summary</h3>
          <div id="summary" class="summary-box"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="notification" class="notification"></div>

  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/booking.js"></script>
</body>
</html>
