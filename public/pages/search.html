<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Buses - Bus Reservation System</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">🚌 BusReserve</div>
      <ul class="nav-menu">
        <li><a href="../index.html">Home</a></li>
        <li><a href="../index.html#search">Search</a></li>
        <li><a href="login.html" id="navLoginLink">Login</a></li>
        <li><a href="#" id="navLogoutLink" style="display:none;" onclick="logout()">Logout</a></li>
      </ul>
    </div>
  </nav>

  <div class="page-container">
    <h1>Search Buses</h1>
    
    <form id="searchForm" class="search-form" onsubmit="performSearch(event)">
      <input type="text" id="from" placeholder="From City" required>
      <input type="text" id="to" placeholder="To City" required>
      <input type="date" id="travelDate" required>
      <button type="submit" class="btn-primary">Search</button>
    </form>

    <div id="resultsContainer" class="results-container">
      <!-- Results will be loaded here -->
    </div>
  </div>

  <div id="notification" class="notification"></div>

  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/booking.js"></script>
</body>
</html>
